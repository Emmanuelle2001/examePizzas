<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada | Pizzería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-3xl mx-auto">
            <div class="relative mb-8 flex justify-center">
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-32 h-32 bg-orange-200 rounded-full opacity-20 animate-ping"></div>
                </div>
                <div class="relative bg-white rounded-2xl shadow-2xl p-8 transform hover:scale-105 transition duration-300">
                    <div class="text-center">
                        <div class="relative inline-block">
                            <svg class="w-32 h-32 text-orange-500 mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" fill="#FED7AA"/>
                                <circle cx="8" cy="9" r="1.5" fill="#EF4444"/>
                                <circle cx="14" cy="14" r="1.5" fill="#10B981"/>
                                <circle cx="16" cy="8" r="1.5" fill="#F59E0B"/>
                                <circle cx="7" cy="15" r="1.5" fill="#8B5CF6"/>
                                <path d="M12 2 L14 6 L10 6 L12 2" fill="#F59E0B"/>
                            </svg>
                            <svg class="w-32 h-32 text-red-500 absolute top-0 left-0 opacity-75" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </div>
                        
                        <h1 class="text-8xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600 mt-4">
                            404
                        </h1>
                        
                        <div class="mt-4 space-y-2">
                            <h2 class="text-3xl font-bold text-gray-800">
                                ¡Oops! Pizza perdida
                            </h2>
                            <p class="text-gray-600 text-lg">
                                Parece que esta pizza no está en nuestro menú
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-r from-orange-50 to-red-50 rounded-2xl p-6 text-center">
                <div class="mt-6">
                    <button onclick="window.location.href='{{ url_for('inicio') }}';"
                            class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-bold rounded-lg transition duration-200 transform hover:scale-105 shadow-lg">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        Regresar al Menú Principal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
